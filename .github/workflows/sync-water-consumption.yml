name: Sync Water Consumption

on:
  schedule:
    # 2nd of every month at 01:00 UTC — previous month is always complete by then
    - cron: "0 1 2 * *"
  workflow_dispatch:
    inputs:
      bill_month:
        description: >
          Bill month to sync as MMYYYY (e.g. 052026 for May 2026).
          Leave blank to sync the previous calendar month.
        required: false
        default: ""

jobs:
  sync:
    name: Grafana → Supabase
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install --quiet requests urllib3

      - name: Run sync script
        env:
          GRAFANA_URL:          ${{ secrets.GRAFANA_URL }}
          GRAFANA_USER:         ${{ secrets.GRAFANA_USER }}
          GRAFANA_PASS:         ${{ secrets.GRAFANA_PASS }}
          GRAFANA_ORG_ID:       ${{ secrets.GRAFANA_ORG_ID }}
          GRAFANA_DS_UID:       ${{ secrets.GRAFANA_DS_UID }}
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          ARGS=""
          if [ -n "${{ github.event.inputs.bill_month }}" ]; then
            ARGS="--bill-month ${{ github.event.inputs.bill_month }}"
          fi
          python muscatbay/app/scripts/sync_water_consumption.py $ARGS
