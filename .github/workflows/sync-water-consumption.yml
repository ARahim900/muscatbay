name: Sync Water Consumption

on:
  schedule:
    # Runs at 01:00 UTC on the 2nd of every month
    # Captures the previous complete month
    - cron: '0 1 2 * *'
  workflow_dispatch:
    inputs:
      bill_month:
        description: 'Override bill month as MMYYYY (e.g. 052026). Leave blank to sync the previous month.'
        required: false
        default: ''

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Run water consumption sync
        env:
          GRAFANA_URL: ${{ secrets.GRAFANA_URL }}
          GRAFANA_USER: ${{ secrets.GRAFANA_USER }}
          GRAFANA_PASS: ${{ secrets.GRAFANA_PASS }}
          GRAFANA_ORG_ID: ${{ secrets.GRAFANA_ORG_ID }}
          GRAFANA_DS_UID: ${{ secrets.GRAFANA_DS_UID }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          BILL_MONTH_OVERRIDE: ${{ github.event.inputs.bill_month }}
        run: python muscatbay/app/scripts/sync_water_consumption.py
