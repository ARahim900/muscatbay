name: Sync Water Consumption

on:
  # ── Manual trigger (works from GitHub mobile app) ────────────────────────
  workflow_dispatch:
    inputs:
      bill_month:
        description: 'Override bill month as MMYYYY (e.g. 052026). Leave blank = current month.'
        required: false
        default: ''

  # ── Automatic: 2nd of every month at 01:00 UTC ───────────────────────────
  # Runs on the 2nd (not 1st) so the full previous month is always complete.
  schedule:
    - cron: '0 1 2 * *'

jobs:
  sync:
    name: Sync Grafana → Supabase
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Run sync script
        env:
          GRAFANA_URL:          ${{ secrets.GRAFANA_URL }}
          GRAFANA_USER:         ${{ secrets.GRAFANA_USER }}
          GRAFANA_PASS:         ${{ secrets.GRAFANA_PASS }}
          GRAFANA_ORG_ID:       ${{ secrets.GRAFANA_ORG_ID }}
          GRAFANA_DS_UID:       ${{ secrets.GRAFANA_DS_UID }}
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          BILL_MONTH_OVERRIDE:  ${{ github.event.inputs.bill_month }}
        run: python muscatbay/app/scripts/sync_water_consumption.py
